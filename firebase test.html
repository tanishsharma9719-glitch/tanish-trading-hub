<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  <h1>TEST 123 FIREBASE</h1>
background:#0f172a;
font-family:Segoe UI,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.box{
background:rgba(255,255,255,.08);

</style>
</head>

<body>

<div class="box">

<h2>Firebase Test Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

<button onclick="resetPassword()">Forgot Password</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

projectId: "tanish-trading-hub",
storageBucket: "tanish-trading-hub.firebasestorage.app",
messagingSenderId: "1041639882163",
appId: "1:1041639882163:web:13379d970cc97ece3e9fc6",
measurementId: "G-DY6011K767"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{
await createUserWithEmailAndPassword(auth,email,password);
msg.innerHTML="Signup Success ✅";
}catch(e){
msg.innerHTML=e.message;
}

}

window.login = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,password);
msg.innerHTML="Login Success ✅";
}catch(e){
msg.innerHTML=e.message;
}

}

window.resetPassword = async function(){

const email=document.getElementById("email").value;

try{
await sendPasswordResetEmail(auth,email);
msg.innerHTML="Reset Email Sent ✅";
}catch(e){
msg.innerHTML=e.message;
}

}

</script>
