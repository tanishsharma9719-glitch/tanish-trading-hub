.logo{

.menu a{

.hero{

    font-weight:bold;
    transition:0.3s;
}

.telegram{
    background:#0088cc;
}

.telegram:hover{
    transform:scale(1.05);
}

.whatsapp{
    background:#25D366;
}

.whatsapp:hover{

}

.arattai{
    background:#ff6b35;
}

.arattai:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:60px;
    padding:20px;
    text-align:center;
    background:white;
    color:gray;
}

@media(max-width:768px){

.navbar{
    flex-direction:column;
}

.hero h1{
    font-size:38px;
}

.btn{
    display:block;
    width:80%;
    margin:12px auto;

}
